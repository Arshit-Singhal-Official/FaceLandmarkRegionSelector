<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MediaPipe Face Mesh Picker</title>
<style>
body {
    background: #111;
    color: white;
    font-family: system-ui;
    text-align: center;
}
#canvasWrapper {
    width: 640px;
    height: 640px;
    overflow: auto;
    border: 1px solid #333;
    margin: 10px auto;
    background: #000;
}
canvas {
    display: block;
}
textarea {
    width: 600px;
    height: 70px;
    background: black;
    color: #0f0;
    border: 1px solid #333;
    margin-top: 10px;
}
button, input[type="file"], label {
    margin: 5px;
    padding: 6px 12px;
}
.controls {
    margin-top: 10px;
}
</style>
</head>
<body>

<h2>MediaPipe Face Mesh Landmark Picker</h2>

<div class="controls">
    <input type="file" id="upload">
    <label>Zoom: <input type="range" id="zoom" min="1" max="8" step="0.5" value="1" oninput="updateZoom()"></label>
</div>

<div id="canvasWrapper">
    <canvas id="canvas" width="640" height="640"></canvas>
</div>

Indices
<br>
<textarea id="indices"></textarea>
<br>
Connections
<br>
<textarea id="tuples"></textarea>
<br>

<button onclick="undo()">Undo</button>
<button onclick="reset()">Reset</button>
<button onclick="copyIndices()">Copy Indices</button>
<button onclick="copyTuples()">Copy Tuples</button>
<button onclick="toggleLabels()">Toggle Labels</button>
<button onclick="toggleMesh()">Toggle Mesh</button>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<script>
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")
const BASE_SIZE = 640

let normalizedLandmarks = []
let landmarks = []
let selected = []
let loadedImage = null

let showLabels = false
let showMesh = false

const FACEMESH_TESSELATION = [
    [127,34],[34,139],[139,127],
    [11,0],[0,37],[37,11],
    [232,231],[231,120],[120,232],
    [72,37],[37,39],[39,72],
    [128,121],[121,47],[47,128],
    [104,69],[69,67],[67,104],
    [175,171],[171,148],[148,175],
    [118,50],[50,101],[101,118],
    [73,39],[39,40],[40,73]
]

function distance(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y)
}

function updateZoom() {
    const z = parseFloat(document.getElementById("zoom").value)
    canvas.width = BASE_SIZE * z
    canvas.height = BASE_SIZE * z
    calculateLandmarks()
    draw()
}

function calculateLandmarks() {
    landmarks = normalizedLandmarks.map(p => ({
        x: p.x * canvas.width,
        y: p.y * canvas.height
    }))
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height)

    if (loadedImage) {
        ctx.drawImage(loadedImage, 0, 0, canvas.width, canvas.height)
    }

    if (showMesh) {
        FACEMESH_TESSELATION.forEach(([a, b]) => {
            if (!landmarks[a] || !landmarks[b]) return
            ctx.beginPath()
            ctx.moveTo(landmarks[a].x, landmarks[a].y)
            ctx.lineTo(landmarks[b].x, landmarks[b].y)
            ctx.strokeStyle = "rgba(0,255,255,0.4)"
            ctx.stroke()
        })
    }

    landmarks.forEach((p, i) => {
        const isSelected = selected.includes(i)
        
        ctx.beginPath()
        ctx.arc(p.x, p.y, isSelected ? 4 : 2, 0, Math.PI * 2)
        ctx.fillStyle = isSelected ? "red" : "white"
        ctx.fill()

        if (showLabels) {
            ctx.fillStyle = "yellow"
            ctx.font = "12px monospace"
            ctx.fillText(i, p.x + 6, p.y + 6)
        }
    })
}

canvas.onclick = e => {
    const rect = canvas.getBoundingClientRect()
    const click = {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
    }

    let closest = -1
    let d = Infinity

    landmarks.forEach((p, i) => {
        let dist = distance(p, click)
        if (dist < d) {
            d = dist
            closest = i
        }
    })

    if (d < 20 && closest !== -1) {
        if (selected[selected.length - 1] !== closest) {
            selected.push(closest)
        }
        updateOutput()
        draw()
    }
}

function updateOutput() {
    document.getElementById("indices").value = "[" + selected.join(",") + "]"

    let tuples = []
    for (let i = 0; i < selected.length - 1; i++) {
        tuples.push(`(${selected[i]},${selected[i+1]})`)
    }
    document.getElementById("tuples").value = "[" + tuples.join(",") + "]"
}

function undo() {
    selected.pop()
    updateOutput()
    draw()
}

function reset() {
    selected = []
    updateOutput()
    draw()
}

function copyIndices() {
    navigator.clipboard.writeText(document.getElementById("indices").value)
}

function copyTuples() {
    navigator.clipboard.writeText(document.getElementById("tuples").value)
}

function toggleLabels() {
    showLabels = !showLabels
    draw()
}

function toggleMesh() {
    showMesh = !showMesh
    draw()
}

document.getElementById("upload").onchange = async e => {
    const file = e.target.files[0]
    const img = new Image()

    img.onload = async () => {
        loadedImage = img
        document.getElementById("zoom").value = 1
        updateZoom()
        await runFaceMesh(img)
    }

    img.src = URL.createObjectURL(file)
}

async function runFaceMesh(image) {
    const faceMesh = new FaceMesh({
        locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    })

    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    })

    faceMesh.onResults(results => {
        if (!results.multiFaceLandmarks) return
        normalizedLandmarks = results.multiFaceLandmarks[0]
        calculateLandmarks()
        draw()
    })

    await faceMesh.send({image})
}
</script>
</body>
</html>
